name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'ci-${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: "${{ github.ref != 'refs/heads/main' }}"

permissions:
  contents: read
  packages: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        shell: bash
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash -o /tmp/download-actionlint.bash
          bash /tmp/download-actionlint.bash
          ./actionlint .github/workflows/*.yml

  node:
    name: Node CI
    uses: JorisJonkers-dev/github-workflows/.github/workflows/node-ci.yml@v0.9.0
    with:
      node-version: '22'
      package-manager: npm
      install-command: npm ci
      lint-command: npm run lint && npm run format:check
      typecheck-command: npm run typecheck
      test-command: npm test
      build-command: npm run package:check && npm run fixture:check
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}

  pipeline-complete:
    name: Pipeline Complete
    if: always()
    needs:
      - workflow-lint
      - node
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gating jobs succeeded
        uses: re-actors/alls-green@release/v1
        with:
          jobs: '${{ toJSON(needs) }}'
